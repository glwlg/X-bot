  #     - ./downloads:/app/downloads
  #     - ./data:/app/data
  #     - ~/.codex:/root/.codex
  #     - ~/.gemini:/root/.gemini
  #     - ~/.local/share/opencode:/root/.local/share/opencode
  #     - ./config:/app/config
  #     # Deployment Staging: 宿主机路径必须与容器内路径一致
  #     # 这是因为 Ikaros 调度的是宿主机 Docker，docker compose 会使用宿主机路径
