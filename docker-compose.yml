  #     - ${X_DEPLOYMENT_STAGING_PATH}:${X_DEPLOYMENT_STAGING_PATH}
  #     - ./extension:/app/extension # 持久化技能与扩展
  #     - /mnt/d/media/dlp:/app/media
  #     - /var/run/docker.sock:/var/run/docker.sock # MCP: 允许启动 MCP 服务容器
  ikaros-api:
    image: ikaros-api
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runtime
    container_name: ikaros-api
    env_file:
      - .env
    restart: unless-stopped
    network_mode: "host"
    command: [ "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8764" ]
    volumes:
      - ./data:/app/data
      - ./config:/app/config
